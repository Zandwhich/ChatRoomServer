name: Build

on:
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Compile project
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Compile
        run: mvn -B compile
